# =======================
    raft_1:
      image: "raft:latest"
      # volumes:
      #   - /data/workspaces/go/github.com/foadmom/RAFT/logs:/logs:rw
      # command: bash -c "/app/RAFT >> /data/workspaces/go/github.com/foadmom/RAFT/logs/raft.log 2>&1"
      networks:
        - "nats-network"
      deploy:
        mode: replicated
        replicas: 5
        resources:
          limits:
            cpus: '0.1'
            memory: 7M
          reservations:
            cpus: '0.05'
            memory: 6M
      depends_on:
        - "nats"

      
