# =======================
# nats cluster with 2 nodes.
# =======================
# =======================
# =======================
    nats:
      image: "nats:latest"
      hostname: "nats-server"
      expose:
        - "8222"
      ports:
        - "8222:8222"
      networks:
        - "nats-network"
      command: "--cluster_name nat-cluster --cluster nats://0.0.0.0:6222 --http_port 8222 "
      deploy:
        resources:
          limits:
            cpus: '0.1'
            memory: 10M
          reservations:
            cpus: '0.05'
            memory: 6M
# =======================
    nats-1:
      image: "nats:latest"
      hostname: "nats-server-1"
      networks:
        - "nats-network"
      command: "--cluster_name nat-cluster --cluster nats://0.0.0.0:6222 --routes=nats://ruser:T0pS3cr3t@nats:6222"
      deploy:
        resources:
          limits:
            cpus: '0.1'
            memory: 10M
          reservations:
            cpus: '0.05'
            memory: 6M
      depends_on:
        - "nats"
    


